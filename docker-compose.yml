# ===========================================
# neu-fund-backend — Docker Compose
# ===========================================
# MongoDB: Dùng Atlas | LLM/Embedding: Ollama (cùng server)
# Ollama chạy trên port 11434 → OLLAMA_BASE_URL=http://host.docker.internal:11434
# Nếu backend và ollama cùng network: OLLAMA_BASE_URL=http://ollama:11434

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: neu-fund-backend
    ports:
      - "8015:8015"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8015
      - MONGODB_URI=${MONGODB_URI:-mongodb+srv://huycv:HuyCV20252026@aiagents.e0vgq4.mongodb.net}
      - MONGODB_DB=${MONGODB_DB:-fitneu}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text:v1.5}
      - USE_OLLAMA_EMBEDDING=${USE_OLLAMA_EMBEDDING:-true}
    restart: unless-stopped
networks:
  neu-fund-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.240.0/24